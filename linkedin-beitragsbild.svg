<svg width="1200" height="627" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1C1E"/>
      <stop offset="100%" stop-color="#2A2A2E"/>
    </linearGradient>
    <linearGradient id="oakGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A07850"/>
      <stop offset="100%" stop-color="#C49A6C"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="627" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="200" y1="0" x2="200" y2="627" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="627" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="627" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="627" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="627" stroke="white" stroke-width="1"/>
    <line x1="0" y1="157" x2="1200" y2="157" stroke="white" stroke-width="1"/>
    <line x1="0" y1="314" x2="1200" y2="314" stroke="white" stroke-width="1"/>
    <line x1="0" y1="471" x2="1200" y2="471" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Oak accent line top -->
  <rect x="80" y="60" width="60" height="3" rx="1.5" fill="url(#oakGrad)"/>
  
  <!-- Badge -->
  <text x="80" y="110" font-family="sans-serif" font-size="13" font-weight="500" fill="#A07850" letter-spacing="3">FÜR ARCHITEKTEN &amp; PLANER</text>
  
  <!-- Main headline -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="64" fill="#F9F8F6" font-weight="400">Projekt</text>
  <text x="80" y="275" font-family="Georgia, serif" font-size="64" fill="#F9F8F6" font-weight="400">briefen.</text>
  
  <!-- Subline -->
  <text x="80" y="340" font-family="sans-serif" font-size="20" fill="#6E6E73" font-weight="300">Ein Tap. Ein Gedanke. Keine Formulare.</text>
  
  <!-- Feature pills -->
  <rect x="80" y="390" width="150" height="36" rx="18" fill="none" stroke="#A07850" stroke-width="1.5"/>
  <text x="155" y="413" font-family="sans-serif" font-size="13" fill="#C49A6C" text-anchor="middle" font-weight="400">Einbaumöbel</text>
  
  <rect x="248" y="390" width="175" height="36" rx="18" fill="none" stroke="#A07850" stroke-width="1.5"/>
  <text x="335" y="413" font-family="sans-serif" font-size="13" fill="#C49A6C" text-anchor="middle" font-weight="400">Schreinerküchen</text>
  
  <rect x="441" y="390" width="180" height="36" rx="18" fill="none" stroke="#A07850" stroke-width="1.5"/>
  <text x="531" y="413" font-family="sans-serif" font-size="13" fill="#C49A6C" text-anchor="middle" font-weight="400">Wandverkleidung</text>
  
  <rect x="639" y="390" width="165" height="36" rx="18" fill="none" stroke="#A07850" stroke-width="1.5"/>
  <text x="721" y="413" font-family="sans-serif" font-size="13" fill="#C49A6C" text-anchor="middle" font-weight="400">Empfang &amp; Theke</text>
  
  <!-- Phone mockup (right side) -->
  <g transform="translate(820, 80)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="280" height="480" rx="32" fill="#F9F8F6" stroke="#E5E5EA" stroke-width="2"/>
    
    <!-- Status bar area -->
    <rect x="16" y="16" width="248" height="28" rx="4" fill="transparent"/>
    <text x="140" y="34" font-family="sans-serif" font-size="10" fill="#6E6E73" text-anchor="middle" font-weight="500">IMS PROJEKTANFRAGE</text>
    
    <!-- Progress bar -->
    <rect x="24" y="52" width="232" height="3" rx="1.5" fill="#E5E5EA"/>
    <rect x="24" y="52" width="77" height="3" rx="1.5" fill="#A07850"/>
    
    <!-- Content -->
    <text x="32" y="100" font-family="Georgia, serif" font-size="22" fill="#1C1C1E">Was planen Sie?</text>
    <text x="32" y="120" font-family="sans-serif" font-size="11" fill="#6E6E73" font-weight="300">Projektart wählen</text>
    
    <!-- Option cards -->
    <rect x="24" y="140" width="232" height="48" rx="14" fill="white" stroke="#A07850" stroke-width="2"/>
    <rect x="24" y="140" width="232" height="48" rx="14" fill="#F0EAE0" opacity="0.5"/>
    <text x="40" y="165" font-family="sans-serif" font-size="14" fill="#1C1C1E" font-weight="500">Einbaumöbel</text>
    <text x="40" y="180" font-family="sans-serif" font-size="10" fill="#6E6E73" font-weight="300">Schränke, Regale, Nischen</text>
    <circle cx="232" cy="164" r="10" fill="#A07850"/>
    <polyline points="226,164 230,168 238,160" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <rect x="24" y="198" width="232" height="48" rx="14" fill="white" stroke="#E5E5EA" stroke-width="1.5"/>
    <text x="40" y="223" font-family="sans-serif" font-size="14" fill="#1C1C1E" font-weight="500">Schreinerküche</text>
    <text x="40" y="238" font-family="sans-serif" font-size="10" fill="#6E6E73" font-weight="300">Korpus, Front, Arbeitsplatte</text>
    
    <rect x="24" y="256" width="232" height="48" rx="14" fill="white" stroke="#E5E5EA" stroke-width="1.5"/>
    <text x="40" y="281" font-family="sans-serif" font-size="14" fill="#1C1C1E" font-weight="500">Wandverkleidung</text>
    <text x="40" y="296" font-family="sans-serif" font-size="10" fill="#6E6E73" font-weight="300">Akustik, Furnier, Lack</text>
    
    <rect x="24" y="314" width="232" height="48" rx="14" fill="white" stroke="#E5E5EA" stroke-width="1.5"/>
    <text x="40" y="339" font-family="sans-serif" font-size="14" fill="#1C1C1E" font-weight="500">Empfang &amp; Theke</text>
    <text x="40" y="354" font-family="sans-serif" font-size="10" fill="#6E6E73" font-weight="300">Rezeption, Bar, Counter</text>
    
    <!-- Bottom nav -->
    <rect x="24" y="420" width="100" height="36" rx="10" fill="#1C1C1E"/>
    <text x="74" y="443" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="500">Weiter →</text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="530" width="1200" height="97" fill="rgba(0,0,0,0.3)"/>
  <text x="80" y="572" font-family="sans-serif" font-size="14" fill="#F9F8F6" font-weight="500">IMS – Ihr Möbel Schreiner</text>
  <text x="80" y="596" font-family="sans-serif" font-size="12" fill="#6E6E73" font-weight="300">CNC-Fertigung aus Murrhardt · projekt.ihr-moebel-schreiner.de</text>
  
  <!-- Oak accent line bottom -->
  <rect x="80" y="530" width="40" height="2" rx="1" fill="url(#oakGrad)"/>
</svg>
